services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dm
    environment:
      CONTROL_DATABASE_URL: ${BACKEND_CONTROL_DATABASE_URL:-sqlite+aiosqlite:////app/runtime/control.db}
      BUSINESS_DB_DIALECT: ${BACKEND_DB_DIALECT:-dm}
      BUSINESS_DB_DRIVER: ${BACKEND_DB_DRIVER:-dmAsync}
      BUSINESS_DM_HOME: ${BACKEND_DM_HOME:-/opt/dmdbms}
      BUSINESS_DM_SVC_PATH: ${BACKEND_DM_SVC_PATH:-/etc/dm-svc}
      BUSINESS_AUTO_CREATE_SCHEMA: ${BACKEND_AUTO_CREATE_SCHEMA:-false}
    volumes:
      - backend_runtime:/app/runtime
      - ./deploy/dm:/etc/dm-svc:ro
