services:
  postgres:
    image: postgres:16-alpine
    container_name: hbbwater-python-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hbbwater}
      POSTGRES_USER: ${POSTGRES_USER:-hbbwater}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hbbwater}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hbbwater} -d ${POSTGRES_DB:-hbbwater}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hbbwater

  emqx:
    image: emqx/emqx:5.7.2
    container_name: hbbwater-python-emqx
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${EMQX_DASHBOARD_PORT:-18083}:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - hbbwater

  backend:
    build:
      context: ./backend
    container_name: hbbwater-python-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hbbwater}:${POSTGRES_PASSWORD:-hbbwater}@postgres:5432/${POSTGRES_DB:-hbbwater}
      JWT_SECRET: ${JWT_SECRET:-change-this-course-demo-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.local}
      MQTT_ENABLED: "true"
      MQTT_HOST: emqx
      MQTT_PORT: 1883
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8501,http://127.0.0.1:8501,http://localhost:8000}
      ALERT_COOLDOWN_MINUTES: ${ALERT_COOLDOWN_MINUTES:-30}
      OFFLINE_TIMEOUT_SECONDS: ${OFFLINE_TIMEOUT_SECONDS:-300}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFY_EMAIL_TO: ${NOTIFY_EMAIL_TO:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hbbwater

  frontend:
    build:
      context: ./frontend
    container_name: hbbwater-python-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000/api}
      API_PUBLIC_BASE_URL: ${API_PUBLIC_BASE_URL:-http://localhost:8000/api}
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hbbwater

networks:
  hbbwater:
    driver: bridge

volumes:
  postgres_data:
  emqx_data:
  emqx_log:

